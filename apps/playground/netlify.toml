[build]
  command = "turbo run build --filter playground"
  publish = "apps/playground/dist"

[build.environment]
  NODE_VERSION = "24"
  NPM_CONFIG_BUILD_FROM_SOURCE = "false"
  NODE_OPTIONS = "--max-old-space-size=6144"

# Feed routes — must be served as text/xml so browsers apply the XSLT stylesheet
# instead of prompting to open a feed reader app.
[[headers]]
  for = "/feed/rss"
  [headers.values]
    Content-Type = "text/xml; charset=utf-8"

[[headers]]
  for = "/feed/atom"
  [headers.values]
    Content-Type = "text/xml; charset=utf-8"

[[headers]]
  for = "/feed/json"
  [headers.values]
    Content-Type = "application/feed+json; charset=utf-8"

[[headers]]
  for = "/feed/*/rss"
  [headers.values]
    Content-Type = "text/xml; charset=utf-8"

[[headers]]
  for = "/feed/*/atom"
  [headers.values]
    Content-Type = "text/xml; charset=utf-8"

[[headers]]
  for = "/feed/*/json"
  [headers.values]
    Content-Type = "application/feed+json; charset=utf-8"

[[headers]]
  for = "/feed/style.xsl"
  [headers.values]
    Content-Type = "text/xsl; charset=utf-8"

[[headers]]
  for = "/feed/style.css"
  [headers.values]
    Content-Type = "text/css; charset=utf-8"

[[headers]]
  for = "/feed/discovery"
  [headers.values]
    Content-Type = "application/json; charset=utf-8"

# /feed redirects to /feed/rss — handled by the Nitro server function
[[redirects]]
  from = "/feed"
  to = "/feed/rss"
  status = 302
