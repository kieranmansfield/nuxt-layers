# pnpm-workspace.yaml

packages:
  - 'apps/*'
  - 'layers/*'
  - 'packages/*'

allowBuilds:
  '@parcel/watcher': true
  'better-sqlite3': true
  'cypress': true
  'esbuild': true
  netlify-cli: true
  'sharp': true
  'sqlite3': true
  unix-dgram: true
  'unrs-resolver': true
  'vue-demi': true

minimumReleaseAgeExclude:
  - '@netlify/nuxt'
  - '@vue/language-core'
  - vue-tsc
  - '@types/node'
  - '@commitlint/cli@21.0.2'
  - '@commitlint/config-conventional@21.0.2'
  - '@commitlint/is-ignored@21.0.2'
  - '@commitlint/lint@21.0.2'
  - '@commitlint/load@21.0.2'
  - '@commitlint/message@21.0.2'
  - '@commitlint/parse@21.0.2'
  - '@commitlint/read@21.0.2'
  - '@commitlint/rules@21.0.2'
  - '@commitlint/top-level@21.0.2'
  - '@nuxt/kit@4.4.7'
  - '@nuxt/nitro-server@4.4.7'
  - '@nuxt/schema@4.4.7'
  - '@nuxt/vite-builder@4.4.7'
  - nuxt@4.4.7
  - skills@1.5.10
  - eslint-plugin-vue@10.9.2

overrides:
  # vue-tsc@3.3.1 / @vue/language-core@3.3.1 published 2026-05-19, blocked by minimumReleaseAge — remove once >24h old
  'vue-tsc': '3.3.3'
  '@vue/language-core': '3.3.3'
  'vue': '3.5.35'
  '@vue/runtime-core': '3.5.35'
  '@vue/runtime-dom': '3.5.35'
  '@vue/reactivity': '3.5.35'
  '@vue/shared': '3.5.35'
  'three': '0.184.0'
  'citty': '0.2.2'
  'stylelint': '17.12.0'
  'eslint': '10.4.1'
  'vite': '^7'

patchedDependencies:
  '@nuxt/vite-builder@4.4.7': patches/@nuxt__vite-builder@4.4.7.patch
catalog:
  '@netlify/nuxt': 0.3.7
  '@netlify/plugin-lighthouse': 6.0.1
  baseline-buildhooks: https://b0650beb-2bfb-4a53-af8a-b8f14c4decaf.netlify.app/packages/buildhooks.tgz
  better-sqlite3: ^12.10.0
  nuxt: ^4.4.7
  prerender-buildhooks: https://6abe5a43-4668-4f72-b3f7-823e2d8bbbbf.netlify.app/packages/buildhooks.tgz
  user-agent-blocker-buildhooks: https://229cd987-05ad-4a05-b612-849942d6bec4.netlify.app/packages/buildhooks.tgz
  vue: ^3.5.35
  vue-router: ^5.1.0
  zod: ^4.4.3
  zod-to-json-schema: ^3.25.2

# minimumReleaseAge: 0
