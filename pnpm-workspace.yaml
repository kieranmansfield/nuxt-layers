# pnpm-workspace.yaml

packages:
  - 'apps/*'
  - 'layers/*'
  - 'packages/*'

allowBuilds:
  '@parcel/watcher': true
  'better-sqlite3': true
  'cypress': true
  'esbuild': true
  'sharp': true
  'sqlite3': true
  'unrs-resolver': true
  'vue-demi': true

minimumReleaseAgeExclude:
  - '@netlify/nuxt'
  - '@vue/language-core'
  - vue-tsc
  - '@types/node'

overrides:
  # vue-tsc@3.3.1 / @vue/language-core@3.3.1 published 2026-05-19, blocked by minimumReleaseAge — remove once >24h old
  'vue-tsc': '3.3.1'
  '@vue/language-core': '3.3.1'
  'vue': '3.5.34'
  '@vue/runtime-core': '3.5.34'
  '@vue/runtime-dom': '3.5.34'
  '@vue/reactivity': '3.5.34'
  '@vue/shared': '3.5.34'
  'three': '0.184.0'
  'citty': '0.2.2'
  'stylelint': '17.11.1'
  'eslint': '10.2.1'
  'typescript': '^6.0.3'

# minimumReleaseAge: 0
