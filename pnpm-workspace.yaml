# pnpm-workspace.yaml

packages:
  - 'apps/*'
  - 'layers/*'
  - 'packages/*'

allowBuilds:
  '@parcel/watcher': true
  'better-sqlite3': true
  'cypress': true
  'esbuild': true
  'sharp': true
  'sqlite3': true
  'unrs-resolver': true
  'vue-demi': true

minimumReleaseAgeExclude:
  - '@netlify/blobs@10.7.8'
  - '@netlify/cache@3.4.7'
  - '@netlify/dev-utils@4.4.5'
  - '@netlify/dev@4.18.6'
  - '@netlify/edge-functions-dev@1.0.19'
  - '@netlify/edge-functions@3.0.7'
  - '@netlify/functions-dev@1.2.11'
  - '@netlify/functions@5.2.2'
  - '@netlify/headers@2.1.10'
  - '@netlify/images@1.3.9'
  - '@netlify/nuxt@0.3.6'
  - '@netlify/otel@6.0.2'
  - '@netlify/redirects@3.1.12'
  - '@netlify/runtime@4.1.24'
  - '@netlify/static@3.1.9'
  - '@netlify/types@2.7.0'
  - '@typescript-eslint/eslint-plugin@8.59.4'
  - '@typescript-eslint/parser@8.59.4'
  - '@typescript-eslint/project-service@8.59.4'
  - '@typescript-eslint/scope-manager@8.59.4'
  - '@typescript-eslint/tsconfig-utils@8.59.4'
  - '@typescript-eslint/type-utils@8.59.4'
  - '@typescript-eslint/types@8.59.4'
  - '@typescript-eslint/typescript-estree@8.59.4'
  - '@typescript-eslint/utils@8.59.4'
  - '@typescript-eslint/visitor-keys@8.59.4'
  - '@vue/language-core@3.3.0'
  - vue-tsc@3.3.0
  - '@types/node@25.9.0'

overrides:
  'vue': '3.5.32'
  '@vue/runtime-core': '3.5.32'
  '@vue/runtime-dom': '3.5.32'
  '@vue/reactivity': '3.5.32'
  '@vue/shared': '3.5.32'
  'three': '0.183.2'
  'citty': '0.2.2'
  'stylelint': '17.7.0'
  'eslint': '10.2.0'
  'typescript': '^6.0.3'
